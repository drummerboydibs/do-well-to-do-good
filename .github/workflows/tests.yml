name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Unit tests don't exercise CSS, so skip the Tailwind/npm build for speed.
      - name: Run tests
        run: dotnet test tests/DoWellToDoGood.Tests/DoWellToDoGood.Tests.csproj -c Release -p:SkipTailwind=true
