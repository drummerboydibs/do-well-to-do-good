<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#a9c9e0" />
    <title>Do Well to Do Good — private mental wellness journaling</title>
    <meta name="description"
          content="A mental wellness app to get you back to your best, so you can make the world better again. Designed from the ground up for privacy." />
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="icons/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png" />
    <link rel="manifest" href="icons/site.webmanifest" />
</head>

<body>
    <div id="app">
        <div class="app-loading">
            <img class="app-loading__logo" src="icons/icon.svg" alt="Do Well to Do Good" width="104" height="104" />
            <div class="loading-progress-text"></div>
        </div>
    </div>

    <noscript>
        <div style="max-width:40rem;margin:18vh auto;padding:2rem;text-align:center;font-family:system-ui;">
            <h1>JavaScript is required</h1>
            <p>Do Well to Do Good runs entirely in your browser to protect your privacy.
               Please enable JavaScript to continue.</p>
        </div>
    </noscript>

    <div id="blazor-error-ui">
        Something went wrong.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="js/wheel.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
